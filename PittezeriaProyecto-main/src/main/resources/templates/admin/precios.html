<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/sidebar :: html_head('Catálogo de Productos - Pizza Eshushon')}"></head>
<body class="bg-light" style="overflow-x: hidden;">

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('productos')}"></div>

    <div class="flex-grow-1 p-4" style="height: 100vh; overflow-y: auto;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark m-0">Catálogo de Productos</h2>
                <p class="text-muted" style="font-size: 0.95rem;">Gestión de la carta comercial, combos y precios</p>
            </div>
            <button class="btn btn-danger rounded-pill px-4 py-2 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#modalNuevoProducto">
                <i class="bi bi-plus-lg me-2"></i> Nuevo Producto
            </button>
        </div>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm mb-3" role="alert">
            <span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show rounded-3 shadow-sm mb-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-danger rounded-pill px-3 fw-medium">Todos</button>
            <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Pizzas</button>
            <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Bebidas</button>
            <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Combos</button>
        </div>

        <div class="row row-cols-1 row-cols-md-4 g-4">
            <div class="col" th:each="prod : ${productos}">
                <div class="card h-100 border-0 shadow-sm rounded-4 p-3 d-flex flex-column justify-content-between position-relative">

                    <div class="rounded-4 text-center py-4 mb-3" style="background-color: #fdf8f4;">
                        <span class="display-5">🍕</span>
                    </div>

                    <div>
                        <h5 class="fw-bold text-dark mb-1" th:text="${prod.nombreProducto}">Margarita</h5>
                        <small class="text-muted d-block mb-2" style="font-size: 0.85rem;" th:text="${prod.categoria.nombreCategoria}">Pizza</small>
                        <h4 class="fw-bold text-danger mb-2" th:text="'S/ ' + ${prod.precio}">S/ 25.00</h4>

                        <!-- Stock Badge -->
                        <span class="badge rounded-pill px-3 py-1 mb-2 d-inline-block"
                              th:classappend="${prod.stock <= 5} ? 'bg-danger-subtle text-danger border border-danger' : 'bg-success-subtle text-success border border-success'"
                              style="font-size: 0.78rem; font-weight: 600;"
                              th:text="'Stock: ' + ${prod.stock} + ' u.'">Stock: 50 u.</span>
                    </div>

                    <!-- Action Buttons Row -->
                    <div class="border-top pt-3 mt-auto d-flex justify-content-between align-items-center gap-2">
                        <!-- Edit Price -->
                        <button class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-semibold flex-grow-1"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#modalPrecio' + ${prod.idProducto}">
                            <i class="bi bi-tag me-1"></i>Precio
                        </button>
                        <!-- Edit Stock -->
                        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-semibold flex-grow-1"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#modalStock' + ${prod.idProducto}">
                            <i class="bi bi-boxes me-1"></i>Stock
                        </button>
                    </div>

                    <!-- Modal: Modify Price -->
                    <div class="modal fade text-start" th:id="'modalPrecio' + ${prod.idProducto}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered modal-sm">
                            <div class="modal-content border-0 shadow rounded-4">
                                <div class="modal-header border-0 pb-0">
                                    <h5 class="fw-bold text-dark m-0">Modificar Precio</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <form th:action="@{/admin/productos/modificar-precio}" method="post">
                                    <div class="modal-body py-3">
                                        <p class="text-muted small mb-3" th:text="'Ajustando precio de ' + ${prod.nombreProducto}"></p>
                                        <input type="hidden" name="idProducto" th:value="${prod.idProducto}">
                                        <div class="form-group">
                                            <label class="form-label text-secondary small fw-bold">NUEVO PRECIO DE VENTA (S/)</label>
                                            <input type="number" step="0.10" name="nuevoPrecio" class="form-control rounded-3" th:value="${prod.precio}" min="0" required>
                                        </div>
                                    </div>
                                    <div class="modal-footer border-0 pt-0">
                                        <button type="button" class="btn btn-light rounded-pill btn-sm px-3" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-danger rounded-pill btn-sm px-3">Actualizar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Modal: Control de Stock (Entrada / Salida / Ajuste) -->
                    <div class="modal fade text-start" th:id="'modalStock' + ${prod.idProducto}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
                            <div class="modal-content border-0 shadow-lg rounded-4">
                                <!-- Header -->
                                <div class="modal-header border-0 pb-0 px-4 pt-4">
                                    <div>
                                        <h5 class="fw-bold text-dark m-0">
                                            <i class="bi bi-arrow-left-right me-2 text-danger"></i>Control de Stock
                                        </h5>
                                        <small class="text-muted" th:text="${prod.nombreProducto}">Producto</small>
                                    </div>
                                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>

                                <form th:action="@{/admin/productos/control-stock}" method="post"
                                      th:id="'formStock' + ${prod.idProducto}">
                                    <div class="modal-body px-4 pt-3 pb-2">

                                        <!-- Stock actual badge -->
                                        <div class="d-flex align-items-center justify-content-between bg-light rounded-3 px-3 py-2 mb-4">
                                            <span class="text-muted small fw-semibold">STOCK ACTUAL</span>
                                            <span class="fw-bold fs-5 text-dark"
                                                  th:classappend="${prod.stock <= 5} ? 'text-danger' : 'text-success'"
                                                  th:text="${prod.stock} + ' u.'">50 u.</span>
                                        </div>

                                        <input type="hidden" name="idProducto" th:value="${prod.idProducto}">

                                        <!-- Tipo de Movimiento -->
                                        <div class="mb-3">
                                            <label class="form-label text-secondary small fw-bold mb-2">TIPO DE MOVIMIENTO</label>
                                            <div class="d-flex gap-2">
                                                <!-- ENTRADA -->
                                                <input type="radio" class="btn-check" name="tipoMovimiento"
                                                       th:id="'entrada' + ${prod.idProducto}"
                                                       value="ENTRADA" required
                                                       th:onchange="'actualizarModoStock(\'' + ${prod.idProducto} + '\', \'ENTRADA\')'">
                                                <label class="btn btn-outline-success rounded-pill fw-semibold flex-grow-1"
                                                       th:for="'entrada' + ${prod.idProducto}">
                                                    <i class="bi bi-box-arrow-in-down me-1"></i>Entrada
                                                </label>

                                                <!-- SALIDA -->
                                                <input type="radio" class="btn-check" name="tipoMovimiento"
                                                       th:id="'salida' + ${prod.idProducto}"
                                                       value="SALIDA"
                                                       th:onchange="'actualizarModoStock(\'' + ${prod.idProducto} + '\', \'SALIDA\')'">
                                                <label class="btn btn-outline-danger rounded-pill fw-semibold flex-grow-1"
                                                       th:for="'salida' + ${prod.idProducto}">
                                                    <i class="bi bi-box-arrow-up me-1"></i>Salida
                                                </label>

                                                <!-- AJUSTE -->
                                                <input type="radio" class="btn-check" name="tipoMovimiento"
                                                       th:id="'ajuste' + ${prod.idProducto}"
                                                       value="AJUSTE"
                                                       th:onchange="'actualizarModoStock(\'' + ${prod.idProducto} + '\', \'AJUSTE\')'">
                                                <label class="btn btn-outline-secondary rounded-pill fw-semibold flex-grow-1"
                                                       th:for="'ajuste' + ${prod.idProducto}">
                                                    <i class="bi bi-sliders me-1"></i>Ajuste
                                                </label>
                                            </div>
                                        </div>

                                        <!-- Descripción dinámica del modo -->
                                        <div th:id="'infoStock' + ${prod.idProducto}"
                                             class="alert alert-light border rounded-3 small mb-3 d-none">
                                            <span th:id="'infoStockTexto' + ${prod.idProducto}"></span>
                                        </div>

                                        <!-- Campo cantidad -->
                                        <div class="mb-1">
                                            <label class="form-label text-secondary small fw-bold"
                                                   th:id="'labelCantidad' + ${prod.idProducto}">CANTIDAD</label>
                                            <div class="input-group">
                                                <span class="input-group-text bg-white border-end-0 fw-bold text-secondary"
                                                      th:id="'prefijoCantidad' + ${prod.idProducto}">+</span>
                                                <input type="number" name="cantidad" min="1" required
                                                       class="form-control border-start-0 rounded-end-3 fw-bold fs-5 py-2"
                                                       th:id="'inputCantidad' + ${prod.idProducto}"
                                                       placeholder="0">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="modal-footer border-0 px-4 pb-4">
                                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-danger rounded-pill px-4 fw-bold">
                                            <i class="bi bi-check-lg me-1"></i>Confirmar
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="modalNuevoProducto" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow rounded-4">
                    <div class="modal-header border-0 pb-0">
                        <h5 class="fw-bold text-dark m-0">Agregar Nuevo Producto a la Carta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/admin/productos/nuevo}" method="post">
                        <div class="modal-body py-3">
                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-bold">NOMBRE DEL ARTÍCULO</label>
                                <input type="text" name="nombreProducto" class="form-control rounded-3" placeholder="Ej: Pizza Americana Hawaiana" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">PRECIO BASE (S/)</label>
                                    <input type="number" step="0.10" name="precio" class="form-control rounded-3" placeholder="0.00" min="0" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-secondary small fw-bold">STOCK INICIAL</label>
                                    <input type="number" name="stock" class="form-control rounded-3" placeholder="0" min="0" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary small fw-bold">CATEGORÍA</label>
                                <select name="idCategoria" class="form-select rounded-3" required>
                                    <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombreCategoria}">Pizzas</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-0 pt-0">
                            <button type="button" class="btn btn-light rounded-pill px-3" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-danger rounded-pill px-4">Registrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function actualizarModoStock(idProducto, modo) {
    const info      = document.getElementById('infoStock'      + idProducto);
    const infoTexto = document.getElementById('infoStockTexto' + idProducto);
    const prefijo   = document.getElementById('prefijoCantidad'+ idProducto);
    const label     = document.getElementById('labelCantidad'  + idProducto);

    info.classList.remove('d-none', 'alert-success', 'alert-danger', 'alert-secondary');

    if (modo === 'ENTRADA') {
        info.classList.add('alert-success');
        infoTexto.textContent = '✅ Se sumará la cantidad ingresada al stock actual.';
        prefijo.textContent   = '+';
        label.textContent     = 'CANTIDAD A INGRESAR';
    } else if (modo === 'SALIDA') {
        info.classList.add('alert-danger');
        infoTexto.textContent = '📦 Se restará la cantidad del stock actual. No puede superar el stock disponible.';
        prefijo.textContent   = '−';
        label.textContent     = 'CANTIDAD A RETIRAR';
    } else if (modo === 'AJUSTE') {
        info.classList.add('alert-secondary');
        infoTexto.textContent = '⚙️ El stock quedará exactamente en la cantidad que ingrese, sin importar el valor anterior.';
        prefijo.textContent   = '=';
        label.textContent     = 'NUEVO STOCK EXACTO';
    }
}
</script>
</body>
</html>
