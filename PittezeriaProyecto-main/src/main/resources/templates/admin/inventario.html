<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/sidebar :: html_head('Gestión de Inventario - Pizza Eshushon')}"></head>
<body class="bg-light" style="overflow-x: hidden;">

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('inventario')}"></div>

    <div class="flex-grow-1 p-4" style="height: 100vh; overflow-y: auto;">

        <div class="mb-4">
            <h2 class="fw-bold text-dark m-0">Gestión de Inventario</h2>
            <p class="text-muted" style="font-size: 0.95rem;">Control y actualización de stock de productos</p>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                    <div class="bg-danger-subtle text-danger rounded-3 p-3 fs-4 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="bi bi-box-seam"></i>
                    </div>
                    <div>
                        <small class="text-muted fw-medium d-block">Total Productos</small>
                        <h4 class="fw-bold text-dark m-0" th:text="${productos.size()}">15</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                    <div class="bg-warning-subtle text-warning rounded-3 p-3 fs-4 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <div>
                        <small class="text-muted fw-medium d-block">Stock Bajo</small>
                        <h4 class="fw-bold m-0"
                            th:classappend="${alertas.size() > 0} ? 'text-danger' : 'text-dark'"
                            th:text="${alertas.size()}">0</h4>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 d-flex flex-row align-items-center gap-3">
                    <div class="bg-success-subtle text-success rounded-3 p-3 fs-4 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                        <i class="bi bi-cash-stack"></i>
                    </div>
                    <div>
                        <small class="text-muted fw-medium d-block">Valor Total</small>
                        <h4 class="fw-bold text-dark m-0">S/ 10,438.00</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4 align-items-center">
            <div class="col-md-8">
                <input type="text" class="form-control py-2 border-0 shadow-sm rounded-3 px-3" placeholder="Buscar productos...">
            </div>
            <div class="col-md-4 text-end">
                <div class="d-flex gap-2 justify-content-end">
                    <button class="btn btn-danger rounded-pill px-3">Todos</button>
                    <button class="btn btn-light border rounded-pill px-3 text-secondary">Pizzas</button>
                    <button class="btn btn-light border rounded-pill px-3 text-secondary">Bebidas</button>
                    <button class="btn btn-light border rounded-pill px-3 text-secondary">Adicionales</button>
                </div>
            </div>
        </div>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm mb-3" role="alert">
            <span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0 text-start">
                    <thead class="table-light text-secondary" style="font-size: 0.9rem;">
                    <tr>
                        <th class="ps-4 py-3">Producto</th>
                        <th class="py-3">Categoría</th>
                        <th class="py-3">Precio</th>
                        <th class="py-3 text-center">Stock Actual</th>
                        <th class="py-3 text-center">Stock Mínimo</th>
                        <th class="py-3 text-center">Estado</th>
                        <th class="pe-4 py-3 text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody style="font-size: 0.95rem; font-weight: 500;">
                    <tr th:each="prod : ${productos}">
                        <td class="ps-4 py-3">
                            <div class="fw-bold text-dark" th:text="${prod.nombreProducto}">Margarita</div>
                            <small class="text-muted fw-normal" style="font-size: 0.8rem;">Tomate, mozzarella y albahaca fresca</small>
                        </td>
                        <td class="py-3">
                                    <span class="badge bg-warning-subtle text-dark border border-warning-subtle rounded-pill px-3 py-1"
                                          style="font-size: 0.75rem; background-color: #fcf4e6 !important;"
                                          th:text="${prod.categoria.nombreCategoria}">Pizza</span>
                        </td>
                        <td class="py-3 text-dark" th:text="'S/ ' + ${prod.precio}">S/ 25.00</td>
                        <td class="py-3 text-center fw-bold"
                            th:classappend="${prod.stock <= 5} ? 'text-danger' : 'text-dark'"
                            th:text="${prod.stock}">50</td>
                        <td class="py-3 text-center text-muted">10</td>
                        <td class="py-3 text-center">
                                    <span class="badge rounded-pill px-3 py-1"
                                          th:classappend="${prod.stock > 0} ? 'bg-success-subtle text-success border border-success' : 'bg-danger-subtle text-danger border border-danger'"
                                          th:text="${prod.stock > 0 ? 'Normal' : 'Sin Stock'}"
                                          style="font-size: 0.75rem;">Normal</span>
                        </td>
                        <td class="pe-4 py-3 text-end">
                            <button class="btn btn-outline-danger btn-sm rounded-3 px-3"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#modalStock' + ${prod.idProducto}">
                                <i class="bi bi-pencil-square me-1"></i> Editar
                            </button>

                            <div class="modal fade text-start" th:id="'modalStock' + ${prod.idProducto}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog modal-dialog-centered modal-sm">
                                    <div class="modal-content border-0 shadow rounded-4">
                                        <div class="modal-header border-0 pb-0">
                                            <h5 class="fw-bold text-dark m-0">Actualizar Stock</h5>
                                            <button type="button" class="btn-close" data-bs-shadow="none" data-bs-dismiss="modal" aria-label="Close"></button>
                                        </div>
                                        <form th:action="@{/admin/productos/actualizar-stock}" method="post">
                                            <div class="modal-body py-3">
                                                <p class="text-muted small mb-3" th:text="'Modificando existencias de ' + ${prod.nombreProducto}"></p>
                                                <input type="hidden" name="idProducto" th:value="${prod.idProducto}">
                                                <div class="form-group">
                                                    <label class="form-label text-secondary small fw-bold">NUEVO STOCK ACTUAL</label>
                                                    <input type="number" name="nuevoStock" class="form-control rounded-3" th:value="${prod.stock}" min="0" required>
                                                </div>
                                            </div>
                                            <div class="modal-footer border-0 pt-0">
                                                <button type="button" class="btn btn-light rounded-pill btn-sm px-3" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-danger rounded-pill btn-sm px-3">Guardar</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
