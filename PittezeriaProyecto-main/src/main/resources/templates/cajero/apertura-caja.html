<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/sidebar :: html_head('Apertura de Caja - Pizza Eshushon')}"></head>

<body class="bg-light" style="overflow-x: hidden;">

    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar('pos')}"></div>

        <!-- Main Panel -->
        <div class="flex-grow-1 p-4 d-flex flex-column align-items-center justify-content-center"
            style="height: 100vh; overflow-y: auto;">

            <div class="card border-0 shadow-lg rounded-5 p-5 bg-white text-center"
                style="width: 100%; max-width: 520px;">
                <!-- Icon -->
                <div class="bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                    style="width: 80px; height: 80px;">
                    <i class="bi bi-cash-register fs-1"></i>
                </div>

                <!-- Title -->
                <h3 class="fw-bold text-dark mb-2">Apertura de Caja Obligatoria</h3>
                <p class="text-muted px-2" style="font-size: 0.95rem;">
                    La caja registradora se encuentra actualmente <strong>cerrada</strong>. Debe declarar el saldo
                    inicial en efectivo para habilitar el Punto de Venta.
                </p>

                <!-- Alerts -->
                <div th:if="${error}" class="alert alert-danger rounded-3 mb-3" th:text="${error}"></div>
                <div th:if="${exito}" class="alert alert-success rounded-3 mb-3" th:text="${exito}"></div>

                <!-- Form -->
                <form th:action="@{/venta/abrir-caja}" method="post" class="text-start mt-4">
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold mb-1">EFECTIVO INICIAL EN CAJA
                            (S/)</label>
                        <div class="input-group">
                            <span
                                class="input-group-text bg-light border-2 rounded-start-3 fw-bold text-secondary">S/</span>
                            <input type="number" step="0.10" name="montoApertura"
                                class="form-control border-2 rounded-end-3 py-3 px-3 fs-5 fw-bold" placeholder="100.00"
                                value="0.00" min="0" required>
                        </div>
                        <small class="text-muted d-block mt-2">
                            Ingrese la cantidad de monedas y billetes destinados para el vuelto inicial del cajero.
                        </small>
                    </div>

                    <button type="submit" class="btn btn-danger btn-lg w-100 rounded-pill fw-bold py-3 shadow-md">
                        <i class="bi bi-unlock-fill me-2"></i>Abrir Caja e Iniciar Ventas
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
