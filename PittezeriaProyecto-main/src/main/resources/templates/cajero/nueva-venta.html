<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/sidebar :: html_head('Punto de Venta - Pizza Eshushon')}"></head>
<body class="bg-light" style="overflow-x: hidden;">

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar('pos')}"></div>

    <div class="flex-grow-1 p-4" style="height: 100vh; overflow-y: auto;">
        <div class="row h-100">

            <div class="col-lg-8 d-flex flex-column">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="fw-bold text-dark m-0">Punto de Venta</h3>
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge bg-success-subtle text-success border border-success rounded-pill px-3 py-2 fw-semibold" style="font-size: 0.85rem;">
                            <i class="bi bi-cash-register me-1"></i> Caja Abierta
                        </span>
                        <form th:action="@{/venta/cerrar-caja}" method="post" class="m-0">
                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                                <i class="bi bi-lock-fill me-1"></i>Cerrar Caja
                            </button>
                        </form>
                    </div>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control py-2 px-3 border-0 shadow-sm rounded-3" placeholder="Buscar productos...">
                </div>

                <div class="d-flex gap-2 mb-4">
                    <button class="btn btn-danger rounded-pill px-3 fw-medium">Todos</button>
                    <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Pizzas</button>
                    <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Bebidas</button>
                    <button class="btn btn-light rounded-pill px-3 border fw-medium text-secondary">Adicionales</button>
                </div>

                <div th:if="${error}" class="alert alert-danger rounded-3" th:text="${error}"></div>
                <div th:if="${exito}" class="alert alert-success rounded-3" th:text="${exito}"></div>

                <div class="row row-cols-1 row-cols-md-3 g-3 flex-grow-1">
                    <div class="col" th:each="prod : ${productos}">
                        <div class="card h-100 border-0 shadow-sm rounded-4 p-3 d-flex flex-column justify-content-between">
                            <div class="bg-linear-pizza rounded-4 text-center py-4 mb-3" style="background-color: #fff0f0;">
                                <span class="fs-1">🍕</span>
                            </div>
                            <div>
                                <h6 class="fw-bold text-dark mb-1" th:text="${prod.nombreProducto}">Margarita</h6>
                                <small class="text-muted d-block mb-3" style="font-size: 0.85rem;" th:text="${prod.categoria.nombreCategoria}">Pizza</small>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-danger fs-5" th:text="'S/ ' + ${prod.precio}">S/ 25.00</span>
                                <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-2 py-1"
                                      th:text="${prod.stock} + ' unid.'">50 unid.</span>
                            </div>

                            <form th:action="@{/venta/agregar}" method="post" class="mt-3">
                                <input type="hidden" name="idProducto" th:value="${prod.idProducto}">
                                <input type="hidden" name="cantidad" value="1">
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100 rounded-pill">Agregar al Pedido</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 bg-white border-start d-flex flex-column justify-content-between p-3 position-fixed end-0 top-0 bottom-0 shadow" style="width: 24vw;">
                <div>
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                        <h5 class="fw-bold m-0"><i class="bi bi-cart3 me-2"></i>Carrito</h5>
                        <span class="badge bg-danger rounded-pill" th:text="${carrito.items.size()} + ' items'">0 items</span>
                    </div>

                    <div class="overflow-auto mb-3" style="max-height: 55vh;">
                        <div th:if="${carrito.items.isEmpty()}" class="text-center text-muted my-5 py-5">
                            <i class="bi bi-cart-x display-4"></i>
                            <p class="mt-2">El carrito está vacío</p>
                        </div>

                        <div th:each="item : ${carrito.items}" class="d-flex justify-content-between align-items-center mb-3 p-2 bg-light rounded-3">
                            <div class="overflow-hidden">
                                <h6 class="m-0 fw-bold text-dark text-truncate" style="font-size: 0.9rem;" th:text="${item.producto.nombreProducto}">Margarita</h6>
                                <small class="text-muted" th:text="${item.cantidad} + ' x S/ ' + ${item.producto.precio}"></small>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <span class="fw-bold text-dark" th:text="'S/ ' + ${item.subtotal}"></span>
                                <a th:href="@{/venta/remover/{id}(id=${item.producto.idProducto})}" class="btn btn-sm btn-link text-danger p-0"><i class="bi bi-trash-fill"></i></a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-top pt-3">
                    <div class="d-flex justify-content-between text-secondary mb-2" style="font-size: 0.95rem;">
                        <span>Subtotal:</span>
                        <span th:text="'S/ ' + ${carrito.subtotal}">S/ 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between text-secondary mb-2" style="font-size: 0.95rem;">
                        <span>IGV (18%):</span>
                        <span th:text="'S/ ' + ${carrito.igv}">S/ 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold text-dark fs-5">Total:</span>
                        <span class="fw-bold text-danger fs-4" th:text="'S/ ' + ${carrito.total}">S/ 0.00</span>
                    </div>

                    <form th:action="@{/venta/confirmar}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">MÉTODO DE PAGO</label>
                            <select name="metodoPago" class="form-select border-0 bg-light py-2 rounded-3" required>
                                <option value="EFECTIVO">💵 Efectivo</option>
                                <option value="YAPE">📱 Yape</option>
                                <option value="PLIN">💳 Plin</option>
                            </select>
                        </div>
                        <button type="submit" th:disabled="${carrito.items.isEmpty()}" class="btn btn-danger btn-lg w-100 rounded-3 fw-bold py-2 shadow-sm">
                            Procesar Pago
                        </button>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
