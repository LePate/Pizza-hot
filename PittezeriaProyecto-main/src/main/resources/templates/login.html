<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pittzeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                    linear-gradient(rgba(245,239,230,.88), rgba(245,239,230,.88)),
                    url('https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1470&auto=format&fit=crop');
            background-size:cover;
            background-position:center;
            padding:20px;
        }

        .login-container{
            width:100%;
            max-width:460px;
        }

        .card{
            border:none !important;
            border-radius:28px !important;
            background:#ffffff;
            box-shadow:
                    0 20px 50px rgba(0,0,0,.10),
                    0 5px 15px rgba(0,0,0,.05);
            overflow:hidden;
        }

        .card-body{
            padding:45px 38px !important;
        }

        .text-center{
            margin-bottom:35px;
        }

        .logo-box{
            width:78px;
            height:78px;
            margin:0 auto 22px;
            border-radius:22px;
            background:linear-gradient(135deg,#d91f26,#b31217);
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 10px 25px rgba(217,31,38,.28);
        }

        .logo-box svg{
            width:38px;
            fill:#fff;
        }

        .display-6{
            font-size:2.2rem;
            font-weight:700;
            color:#1d2433 !important;
            margin-bottom:5px;
            letter-spacing:.5px;
        }

        .display-6 span{
            color:#d91f26;
        }

        .text-muted{
            color:#7c8595 !important;
            font-size:.95rem;
            font-weight:400;
        }

        .form-floating{
            margin-bottom:22px;
        }

        .form-control{
            height:62px;
            width: 100%;
            border-radius:16px;
            border:2px solid #eceef3;
            background:#f8f9fc;
            font-size:.95rem;
            padding-left:18px;
            transition:.25s ease;
            box-shadow:none !important;
        }

        .form-control:focus{
            border-color:#d91f26;
            background:#fff;
            box-shadow:0 0 0 4px rgba(217,31,38,.08) !important;
        }

        .form-floating label{
            color:#8a93a5;
            padding-left:18px;
        }

        .btn-warning{
            width:100%;
            height:58px;
            border:none !important;
            border-radius:16px !important;
            background:linear-gradient(135deg,#e11d2e,#c1121f) !important;
            color:#fff !important;
            font-size:1rem;
            font-weight:600;
            letter-spacing:.3px;
            transition:.25s ease;
            box-shadow:0 10px 25px rgba(225,29,46,.25);
        }

        .btn-warning:hover{
            transform:translateY(-2px);
            box-shadow:0 14px 30px rgba(225,29,46,.32);
        }

        .alert{
            border:none !important;
            border-radius:14px;
            padding:14px 16px;
            font-size:.92rem;
            margin-bottom:20px;
        }

        .alert-danger{
            background:#ffe8ea;
            color:#c1121f;
        }

        .alert-success{
            background:#e8fff0;
            color:#198754;
        }

        .demo-box{
            margin-top:28px;
            background:#fff6e8;
            border:1px solid #ffe0a8;
            border-radius:18px;
            padding:16px;
        }

        .demo-title{
            font-size:.88rem;
            font-weight:600;
            color:#8a5a00;
            margin-bottom:12px;
        }

        .demo-accounts{
            display:flex;
            gap:12px;
        }

        .demo-card{
            flex:1;
            background:#fff;
            border-radius:12px;
            padding:12px;
        }

        .demo-card strong{
            display:block;
            font-size:.88rem;
            color:#1f2937;
            margin-bottom:4px;
        }

        .demo-card span{
            font-size:.82rem;
            color:#6b7280;
        }

        .footer-text{
            text-align:center;
            margin-top:22px;
            color:#8a93a5;
            font-size:.82rem;
        }

        @media(max-width:480px){

            .card-body{
                padding:35px 24px !important;
            }

            .display-6{
                font-size:1.9rem;
            }

            .demo-accounts{
                flex-direction:column;
            }

        }

    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h1 class="display-6 fw-bold text-warning"> Pittzeria</h1>
                <p class="text-muted">Ingresa al sistema de ventas</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger role='alert'">
                Usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="alert alert-success role='alert'">
                Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Nombre de usuario" required>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                </div>

                <button class="w-100 btn btn-lg btn-warning fw-bold text-dark rounded-pill" type="submit">
                    Ingresar
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
