<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="html_head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Pizza Eshushon - POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <style>
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background-color: #fcfcfc;
            border-right: 1px solid #eaeaea;
        }

        .nav-link-custom {
            color: #565656;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 12px;
            margin: 4px 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-link-custom i {
            font-size: 1.2rem;
            margin-right: 12px;
        }

        .nav-link-custom:hover {
            background-color: #f5f5f5;
            color: #000;
        }

        .nav-link-custom.active {
            background-color: #dc3545;
            color: #ffffff !important;
        }

        .user-panel {
            background-color: #f4efe6;
            border-radius: 12px;
            margin: 15px;
            padding: 12px;
        }
    </style>
</head>

<body>

    <div th:fragment="sidebar(currentSection)" class="sidebar d-flex flex-column justify-content-between py-4">
        <div>
            <div class="px-4 mb-4 d-flex align-items-center">
                <div class="bg-danger text-white rounded-3 p-2 me-2 d-flex align-items-center justify-content-center"
                    style="width: 40px; height: 40px;">
                    <span class="fs-4">🍕</span>
                </div>
                <div>
                    <h6 class="fw-bold m-0 text-dark">Pizzería</h6>
                    <small class="text-muted" style="font-size: 0.75rem;">Sistema POS</small>
                </div>
            </div>

            <nav class="nav flex-column">

                <!-- Dashboard — solo ADMINISTRADOR -->
                <a sec:authorize="hasRole('ROLE_ADMINISTRADOR')" th:href="@{/index}"
                    th:classappend="${currentSection == 'dashboard'} ? 'active' : ''" class="nav-link-custom">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>

                <!-- Punto de Venta — todos los roles -->
                <a th:href="@{/venta/nueva}" th:classappend="${currentSection == 'pos'} ? 'active' : ''"
                    class="nav-link-custom">
                    <i class="bi bi-cart-fill"></i> Punto de Venta
                </a>

                <!-- Inventario → /admin/productos  (vista unificada de catálogo + stock) -->
                <a sec:authorize="hasRole('ROLE_ADMINISTRADOR')" th:href="@{/admin/productos}"
                    th:classappend="${currentSection == 'inventario' || currentSection == 'productos'} ? 'active' : ''"
                    class="nav-link-custom">
                    <i class="bi bi-box-seam-fill"></i> Productos
                </a>

                <!-- Cierre de Caja → /admin/reportes/cierre-caja  (NUEVO) -->
                <a sec:authorize="hasRole('ROLE_ADMINISTRADOR')" th:href="@{/admin/reportes/cierre-caja}"
                    th:classappend="${currentSection == 'cierre'} ? 'active' : ''" class="nav-link-custom">
                    <i class="bi bi-cash-stack"></i> Cierre de Caja
                </a>

                <!-- Estadísticas → /admin/reportes/estadisticas -->
                <a sec:authorize="hasRole('ROLE_ADMINISTRADOR')" th:href="@{/admin/reportes/estadisticas}"
                    th:classappend="${currentSection == 'reportes'} ? 'active' : ''" class="nav-link-custom">
                    <i class="bi bi-bar-chart-fill"></i> Estadísticas
                </a>

            </nav>
        </div>

        <div>
            <div class="user-panel d-flex align-items-center">
                <div class="bg-secondary text-white rounded-circle d-flex align-items-center justify-content-center me-2"
                    style="width: 35px; height: 35px;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="overflow-hidden">
                    <h6 class="m-0 fw-bold text-dark text-truncate" style="font-size: 0.9rem;"
                        sec:authentication="name">Administrador</h6>
                    <small class="text-muted" style="font-size: 0.8rem;"
                        sec:authentication="principal.authorities[0].authority">Rol</small>
                </div>
            </div>
            <div class="px-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm w-100 rounded-pill">
                        <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                    </button>
                </form>
            </div>
        </div>
    </div>

</body>

</html>
