# Configuración de la Base de Datos (MariaDB / MySQL)
spring.datasource.url=jdbc:mariadb://localhost:3306/pizzeria_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=X2100
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Configuración de Thymeleaf
spring.thymeleaf.cache=false

# ─────────────────────────────────────────────
# Logback: niveles de log por paquete
# ─────────────────────────────────────────────
logging.level.com.integrador.Pittzeria=DEBUG
logging.level.com.integrador.Pittzeria.service=INFO
logging.level.com.integrador.Pittzeria.controller=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n